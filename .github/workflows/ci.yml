name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Create directories
        run: mkdir -p data/processed ~/.dbt

      - name: Set up dbt profile
        run: |
          echo "insurance_pricing:" > ~/.dbt/profiles.yml
          echo "  target: dev" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    dev:" >> ~/.dbt/profiles.yml
          echo "      type: duckdb" >> ~/.dbt/profiles.yml
          echo "      path: ${GITHUB_WORKSPACE}/data/processed/insurance.duckdb" >> ~/.dbt/profiles.yml
          echo "      threads: 1" >> ~/.dbt/profiles.yml

      - name: Seed minimal raw data for dbt
        run: python scripts/seed_ci.py

      - name: Run dbt models
        working-directory: dbt
        run: dbt run --profiles-dir ~/.dbt

      - name: Run dbt tests
        working-directory: dbt
        run: dbt test --profiles-dir ~/.dbt